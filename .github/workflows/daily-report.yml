name: Daily Analytics Report

on:
  schedule:
    - cron: '0 0 * * *'  # 09:00 JST (00:00 UTC)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run daily report
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA4_REFRESH_TOKEN: ${{ secrets.GA4_REFRESH_TOKEN }}
          GA4_CLIENT_ID: ${{ secrets.GA4_CLIENT_ID }}
          GA4_CLIENT_SECRET: ${{ secrets.GA4_CLIENT_SECRET }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HISTORY_FILE: data/analytics-history.json
        run: node scripts/daily-report.mjs

      - name: Commit updated history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/analytics-history.json
          git diff --staged --quiet || git commit -m "chore: update analytics history [skip ci]"
          git push
